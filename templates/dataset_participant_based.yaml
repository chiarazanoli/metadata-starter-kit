measurement_table:
  - device_id: "DEV-003"
  - table_name: "participant-id_bodycap_startdate"
    file_pattern: "data/processed/*.csv" ###
    description: "CBT measurements with BodyCap ingestible pills"
    key_columns: "for each pill:"
      - "Date(dd/mm/yyyy)"
      - "Hour"
      - "Temperature (°C)"
    variables:
      - name: "Date(dd/mm/yyyy)"
        type: "string"
        format: "DD/MM/YYYY" 
        required: true
        description: "local timestamp - date"
      - name: "Hour"
        type: "string"
        format: "HH:MM:SS,ff"
        required: true
        description: "local timestamp - time"
      - name: "Temperature (°C)"
        type: "string/df.to_numeric"
        required: true
        description: "temperature in Celsius degrees"
notes: the three pills in each file have a different number of sample measurements.

measurement_table:
  - device_id: "DEV-005"
  - table_name: "participant-id_T_prox"
    file_pattern: "data/processed/*.csv" ###
    description: "iButton peripheral temperature measurements"
    key_columns:
      - "date"
      - "time"
      - "value"
    variables:
      - name: "date"
        type: "string"
        format: "YYYY-MM-DD" 
        required: true
        description: "local timestamp - date"
      - name: "time"
        type: "string"
        format: "HH:MM:SS"
        required: true
        description: "local timestamp - time"
      - name: "value"
        type: "string/df.to_numeric"
        required: true
        description: "temperature in Celsius degrees"
notes: null

measurement_table:
  - device_id: "DEV-005"
  - table_name: "participant-id_T_dist"
    file_pattern: "data/processed/*.csv" ##
