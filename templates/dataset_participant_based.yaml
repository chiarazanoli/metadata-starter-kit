measurement_table:
  - device_id: "DEV-001.2"
  - table_name: "participant-id_HR"
    file_pattern: "data/processed/*.csv" ###
    description: "Kardio\PR_Kurve table"
    key_columns:
      - "datetime"
      - "bpm"
    variables:
      - name: "datetime"
        type: "string/df.to_datetime"
        format: "DD.MM.YYYY HH:MM:SS,fff"
        required: true
        description: ""Local timestamp"
      - name: "bpm"
        type: "string/df.to_numeric"
        required: true
        description: "heart rate in bpm unit"

notes: only the second device for each participants has a measurement rate of 30s.

measurement_table:
  - device_id: "DEV-001.2"
  - table_name: "participant-id_RRI"
    file_pattern: "data/processed/*.csv" ###
    description: "Kardio\RR_Abstand"
    key_columns:
      - "datetime"
      - "value"
    variables:
      - name: "datetime"
        type: "string/df.to_datetime"
        format: "DD.MM.YYYY HH:MM:SS,fff"
        required: true
        description: ""Local timestamp"
      - name: "ms"
        type: "string/df.to_numeric"
        required: true
        description: "interval lenght in ms"

notes: only the second device for each participants has a measurement rate of 30s and a state column with Wake/Sleep string values. 


