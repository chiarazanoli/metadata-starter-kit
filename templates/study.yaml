study_id: "PROJECT-001-STUDY" ###
study_title: "Study Title"    ###
project_id: "CiViBe Project"  
study_abstract: >
  In this study, we disentangle circadian and homeostatic effects on variations of retinal
  function. We examine the earliest stages of image-forming (temporal contrast sensitivity
  of the post-receptoral channels) and non-image forming visual functions (pupillary
  light response) by employing a short forced-desynchrony multiple-naps protocol lasting
  40 hours. Participants (n = 12, 50% female) will stay in a controlled time-isolating environment
  under dim-light conditions and adhere to an ultra-short sleep-wake cycle, alternating
  between 2h30m of wake time in dim light and hour of sleep in no light. During
  eleven intervals of wakefulness, participants will undergo psychophysical and pupillometric
  assessments with silent-substitution stimuli. We hypothesize that the sensitivity of retinal
  mechanisms undergoes circadian variations. This hypothesis will be investigated by
  separately determining psychophysical contrast thresholds to silent-substitution stimuli
  targeting the post-receptoral (consistency) pathways (isoluminant red-green, L–M; isoluminant
  blue-yellow, S; luminance, L+M+S). We will furthermore measure the pupillary
  light response to peripheral stimuli (annulus 10°–30°) in comparison to the response to
  stimuli isolating or including melanopsin stimulation. All stimuli will be delivered at constant
  retinal irradiance using a Maxwellian view system or artificially restricting pupil size.
  Additionally, we will quantify and report effects of our test stimuli on the circadian system
  by comparing the dim light melatonin onset (DLMO) timing during two supplementary
  evening sessions, comparing dim-light conditions to such with experimental light exposure.
  Our work informs the fundamental biological mechanisms underlying the influence
  of light on the human circadian system.
