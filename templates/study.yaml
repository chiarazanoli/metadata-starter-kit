protocol:  
  version: "1.0"  ###
  registration_url: "https://osf.io/example"  ###
  protocol_document: "doi.org/10.1371/journal.pone.0300405" (or "docs/protocol.pdf"??)  ### 
  summary: >
    Participants follow a within-participant study spanning several weeks. Each participant will take 
    part in one evening session a week after starting a circadian stabilisation phase, then come 
    in for another evening session that is followed by an adaptation night and the subsequent 
    completions of the forced-desynchrony protocol, which encompasses 11 measurement blocks and 
    spans 40 hours. After it (Post-FD) another stabilisation periods of 1 week occur. 

    The 40 hours FD protocol consist of repeating measurement blocks interspersed with sleep opportunities 
    to prevent sleep deprivation, thus systematically shortening a typical sleep-wake cycle from 
    approximately 24 hours to 3h45m: 2 h 30 min wake (eyes open, <10 lux) followed by 1 h 15 min 
    sleep (eyes closed, 0 lux). During one period of 24 hours, participants will thus complete 
    6.4 sleepwake cycles. Within each wake period, participants complete repeated 
    assessments including surveys, psychophysics, pupillometry, OCT, intraocular pressure, 
    psychomotor vigilance, and enrichment tasks. Standardized meals are paired with saliva and 
    blood pressure collection. Continuous measurements—core body temperature (CBT), continuous 
    glucose monitoring (CGM), and ECG—are recorded throughout.

