dataset_id: "DATASET-003"
dataset_name: "BodyCap"
study_id: "PROJECT-001-STUDY" ###
project_id: "CiViBe Project"
dataset_description: >
  Core body temperature (CBT) measurements with BodyCap ingestible pills. 3 pills per participant 
  in each file, 1 file per participant.   
version: "1.0.0"
release_date: " " ###

file_structure:
  base_path: "data/"
  description: >
    Brief directory structure overview.  ###
  files:
    - path: "data/raw/bodycap/"
      description: "Raw device files"
      file_pattern: "*.csv"
      modality: " " ###
      device_id: "DEV-003"

tabular_variables:
  - table_name: "participant-id_bodycap_startdate"
    file_pattern: "data/processed/*.csv" ###
    description: "CBT measurements with BodyCap ingestible pills"
    key_columns: "for each pill:"
      - "Date(dd/mm/yyyy)"
      - "Hour"
      - "Temperature (°C)"
    variables:
      - name: "Date(dd/mm/yyyy)"
        type: "string"
        format: "DD/MM/YYYY" 
        required: true
        description: "local timestamp - date"
      - name: "Hour"
        type: "string"
        format: "HH:MM:SS,ff"
        required: true
        description: "local timestamp - time"
      - name: "Temperature (°C)"
        type: "string/df.to_numeric"
        required: true
        description: "temperature in Celsius degrees"

notes: the three pills in each file have a different number of sample measurements.


